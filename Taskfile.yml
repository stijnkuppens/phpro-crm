version: "3"

dotenv: ['.env']

vars:
  DB_URL: "postgresql://postgres:{{.POSTGRES_PASSWORD}}@localhost:54320/postgres"
  DB_CONTAINER: supabase-db

tasks:
  setup:
    desc: "Run the full interactive project setup"
    cmds:
      - bash setup.sh

  # ── Development ────────────────────────────────────

  dev:
    desc: "Start Supabase (Docker Compose) and Next.js dev server"
    cmds:
      - task: dev:supabase
      - task: dev:next

  dev:supabase:
    desc: "Start Supabase via Docker Compose"
    cmds:
      - docker compose up -d

  dev:next:
    desc: "Start Next.js development server"
    cmds:
      - npm run dev

  dev:stop:
    desc: "Stop Supabase containers"
    cmds:
      - docker compose down

  dev:restart:
    desc: "Restart all Supabase containers"
    cmds:
      - docker compose down
      - docker compose up -d

  dev:logs:
    desc: "Tail logs from all Supabase containers"
    cmds:
      - docker compose logs -f --tail=50

  dev:status:
    desc: "Show status of all containers"
    cmds:
      - docker compose ps

  dev:studio:
    desc: "Open Supabase Studio in the browser"
    cmds:
      - open http://localhost:8000

  # ── Database ───────────────────────────────────────

  db:migrate:
    desc: "Apply pending migrations to the database"
    env:
      PGSSLMODE: disable
    cmds:
      - npx supabase db push --include-all --db-url "{{.DB_URL}}"

  db:migrate:dry:
    desc: "Dry-run migrations (show what would be applied)"
    cmds:
      - npx supabase db push --dry-run --db-url "{{.DB_URL}}"

  db:new-migration:
    desc: "Create a new migration file (usage: task db:new-migration -- <name>)"
    cmds:
      - |
        NAME={{.CLI_ARGS}}
        NUM=$(printf "%05d" $(( $(ls supabase/migrations/*.sql 2>/dev/null | sed 's/.*\///' | sed 's/_.*//' | sort -n | tail -1) + 1 )))
        FILE="supabase/migrations/${NUM}_${NAME}.sql"
        touch "$FILE"
        echo "Created $FILE"

  db:reset:
    desc: "Drop and recreate database, re-run init scripts"
    cmds:
      - docker compose down -v --remove-orphans
      - rm -rf docker/volumes/db/data
      - mkdir -p docker/volumes/db/data
      - docker compose up -d
      - echo "Waiting for DB to be healthy..."
      - sleep 10
      - task: db:migrate
      - task: db:data
      - task: db:fixtures

  db:data:
    desc: "Apply production data only"
    cmds:
      - |
        for f in supabase/data/*.sql; do
          echo "  $(basename $f)"
          docker exec -i {{.DB_CONTAINER}} psql -U postgres -q < "$f"
        done

  db:fixtures:
    desc: "Load demo fixtures (dev/staging only)"
    cmds:
      - |
        for f in supabase/fixtures/*.sql; do
          echo "  $(basename $f)"
          docker exec -i {{.DB_CONTAINER}} psql -U postgres -q < "$f"
        done

  db:backup:
    desc: "Backup database (add -- --prod for production)"
    cmds:
      - bash scripts/db-backup.sh {{.CLI_ARGS}}

  db:restore:
    desc: "Restore database from backup (usage: task db:restore -- <file>)"
    cmds:
      - |
        FILE={{.CLI_ARGS}}
        if [ -z "$FILE" ]; then echo "Usage: task db:restore -- supabase/backups/<file>.sql.gz"; exit 1; fi
        echo "Restoring from $FILE..."
        gunzip -c "$FILE" | docker exec -i {{.DB_CONTAINER}} psql -U postgres
        echo "Restored."

  db:psql:
    desc: "Open psql shell"
    cmds:
      - docker exec -it {{.DB_CONTAINER}} psql -U postgres

  # ── Types ──────────────────────────────────────────

  types:generate:
    desc: "Generate TypeScript types from the database schema"
    cmds:
      - npx supabase gen types typescript --db-url "{{.DB_URL}}" --schema public 2>/dev/null > src/types/database.ts

  # ── Scaffolding ────────────────────────────────────

  entity:new:
    desc: "Scaffold a new entity (usage: task entity:new -- <name>)"
    cmds:
      - bash scripts/entity-new.sh {{.CLI_ARGS}}

  # ── Quality ────────────────────────────────────────

  lint:
    desc: "Run ESLint"
    cmds:
      - npm run lint

  typecheck:
    desc: "Run TypeScript type checking"
    cmds:
      - npx tsc --noEmit

  build:
    desc: "Build the Next.js application"
    cmds:
      - npm run build

  # ── Production ─────────────────────────────────────

  prod:up:
    desc: "Start full production stack (Supabase + Next.js in Docker)"
    cmds:
      - docker compose --profile prod up -d --build

  prod:down:
    desc: "Stop production stack"
    cmds:
      - docker compose --profile prod down

  # ── Cleanup ────────────────────────────────────────

  clean:
    desc: "Stop all containers and remove volumes (DESTROYS DATA)"
    cmds:
      - docker compose down -v
      - echo "All containers stopped and volumes removed."
