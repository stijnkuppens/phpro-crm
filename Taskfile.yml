version: "3"

dotenv: ['.env']

tasks:
  setup:
    desc: "Run the full interactive project setup"
    cmds:
      - bash setup.sh

  dev:
    desc: "Start Supabase and Next.js dev server"
    cmds:
      - task: dev:supabase
      - task: dev:next

  dev:supabase:
    desc: "Start Supabase local dev via CLI"
    cmds:
      - npx supabase start

  dev:next:
    desc: "Start Next.js development server"
    cmds:
      - npm run dev

  dev:stop:
    desc: "Stop Supabase local dev"
    cmds:
      - npx supabase stop

  db:migrate:
    desc: "Apply pending migrations to local database"
    cmds:
      - npx supabase db push --local

  db:new-migration:
    desc: "Create a new migration file (usage: task db:new-migration -- <name>)"
    cmds:
      - |
        NAME={{.CLI_ARGS}}
        NUM=$(printf "%05d" $(( $(ls supabase/migrations/*.sql 2>/dev/null | sed 's/.*\///' | sed 's/_.*//' | sort -n | tail -1) + 1 )))
        FILE="supabase/migrations/${NUM}_${NAME}.sql"
        touch "$FILE"
        echo "Created $FILE"

  db:reset:
    desc: "Drop and recreate database, re-run migrations and seed"
    cmds:
      - npx supabase db reset

  db:data:
    desc: "Apply production data only"
    cmds:
      - |
        for f in supabase/data/*.sql; do
          echo "  $(basename $f)"
          docker exec -i supabase_db_phpro-crm psql -U postgres -q < "$f"
        done

  db:fixtures:
    desc: "Load demo fixtures (dev/staging only)"
    cmds:
      - |
        for f in supabase/fixtures/*.sql; do
          echo "  $(basename $f)"
          docker exec -i supabase_db_phpro-crm psql -U postgres -q < "$f"
        done

  db:studio:
    desc: "Open Supabase Studio in the browser"
    cmds:
      - open http://localhost:54323

  types:generate:
    desc: "Generate TypeScript types from the database schema"
    cmds:
      - npx supabase gen types typescript --local --schema public 2>/dev/null > src/types/database.ts

  entity:new:
    desc: "Scaffold a new entity (usage: task entity:new -- <name>)"
    cmds:
      - bash scripts/entity-new.sh {{.CLI_ARGS}}

  lint:
    desc: "Run ESLint"
    cmds:
      - npm run lint

  typecheck:
    desc: "Run TypeScript type checking"
    cmds:
      - npx tsc --noEmit

  build:
    desc: "Build the Next.js application"
    cmds:
      - npm run build

  prod:up:
    desc: "Start production stack"
    cmds:
      - docker compose -f docker-compose.prod.yml up -d --build

  prod:down:
    desc: "Stop production stack"
    cmds:
      - docker compose -f docker-compose.prod.yml down

  clean:
    desc: "Stop Supabase and remove all local data"
    cmds:
      - npx supabase stop --no-backup

  logs:
    desc: "Tail Supabase logs"
    cmds:
      - npx supabase logs

  status:
    desc: "Show Supabase service status and URLs"
    cmds:
      - npx supabase status
