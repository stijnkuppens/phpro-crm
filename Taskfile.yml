version: "3"

tasks:
  setup:
    desc: "Run the full interactive project setup"
    cmds:
      - bash setup.sh

  dev:
    desc: "Start Supabase and Next.js dev server (auto-setup on first run)"
    cmds:
      - |
        if [ ! -f .env ]; then
          bash setup.sh
        else
          docker compose up -d
        fi
      - task: dev:next

  dev:supabase:
    desc: "Start Supabase services via docker compose"
    cmds:
      - docker compose up -d

  dev:next:
    desc: "Start Next.js development server"
    cmds:
      - npm run dev

  dev:stop:
    desc: "Stop all Supabase docker services"
    cmds:
      - docker compose down

  db:migrate:
    desc: "Run all migration files against the database"
    cmds:
      - for f in supabase/migrations/*.sql; do echo "Applying $(basename $f)..." && docker compose exec -T db psql -U supabase_admin -h 127.0.0.1 -d postgres < "$f"; done

  db:new-migration:
    desc: "Create a new migration file (usage: task db:new-migration -- <name>)"
    cmds:
      - |
        NAME={{.CLI_ARGS}}
        NUM=$(printf "%05d" $(( $(ls supabase/migrations/*.sql 2>/dev/null | wc -l) + 1 )))
        FILE="supabase/migrations/${NUM}_${NAME}.sql"
        touch "$FILE"
        echo "Created $FILE"

  db:reset:
    desc: "Drop and recreate the public schema, re-run migrations, data, and fixtures"
    cmds:
      - docker compose exec -T db psql -U supabase_admin -h 127.0.0.1 -d postgres -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO postgres; GRANT USAGE ON SCHEMA public TO anon; GRANT USAGE ON SCHEMA public TO authenticated; GRANT USAGE ON SCHEMA public TO service_role; DELETE FROM auth.users;"
      - task: db:migrate
      - task: db:data
      - task: db:fixtures

  db:seed:
    desc: "Run both production data and demo fixtures"
    cmds:
      - task: db:data
      - task: db:fixtures

  db:data:
    desc: "Apply production data migrations (safe for all environments)"
    cmds:
      - for f in supabase/data/*.sql; do echo "  $(basename $f)" && docker compose exec -T db psql -U supabase_admin -h 127.0.0.1 -d postgres -q < "$f"; done

  db:fixtures:
    desc: "Load demo fixtures (dev/staging only, never production)"
    cmds:
      - for f in supabase/fixtures/*.sql; do echo "  $(basename $f)" && docker compose exec -T db psql -U supabase_admin -h 127.0.0.1 -d postgres -q < "$f"; done

  db:studio:
    desc: "Open Supabase Studio in the browser"
    cmds:
      - open http://localhost:${STUDIO_PORT:-3001}

  types:generate:
    desc: "Generate TypeScript types from the database schema"
    cmds:
      - npx supabase gen types typescript --db-url "postgresql://postgres:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_EXPOSED_PORT:-5432}/postgres" --schema public > src/types/database.ts

  entity:new:
    desc: "Scaffold a new entity (usage: task entity:new -- <name>)"
    cmds:
      - bash scripts/entity-new.sh {{.CLI_ARGS}}

  lint:
    desc: "Run ESLint"
    cmds:
      - npm run lint

  typecheck:
    desc: "Run TypeScript type checking"
    cmds:
      - npx tsc --noEmit

  build:
    desc: "Build the Next.js application"
    cmds:
      - npm run build

  prod:up:
    desc: "Start production stack with docker compose"
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

  clean:
    desc: "Stop and remove all containers and volumes"
    cmds:
      - docker compose down -v --remove-orphans

  logs:
    desc: "Tail all docker compose logs"
    cmds:
      - docker compose logs -f

  logs:supabase:
    desc: "Tail logs for a specific Supabase service (usage: task logs:supabase -- <service>)"
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}
